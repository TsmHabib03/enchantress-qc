<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nail Salon Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/styles.css" rel="stylesheet" />
  </head>
  <body class="admin-bg">
    <main class="container py-4">
      <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Admin Dashboard</h1>
        <button id="refresh" class="btn btn-outline-primary btn-sm">Refresh</button>
      </header>

      <section class="row g-3 mb-4">
        <div class="col-md-4"><div class="card shadow-sm border-0"><div class="card-body"><h2 class="h6">Today Appointments</h2><p id="metric-appointments" class="h4 mb-0">-</p></div></div></div>
        <div class="col-md-4"><div class="card shadow-sm border-0"><div class="card-body"><h2 class="h6">Completed</h2><p id="metric-completed" class="h4 mb-0">-</p></div></div></div>
        <div class="col-md-4"><div class="card shadow-sm border-0"><div class="card-body"><h2 class="h6">Estimated Revenue</h2><p id="metric-revenue" class="h4 mb-0">-</p></div></div></div>
      </section>

      <section class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h5">Today Schedule</h2>
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Customer</th>
                  <th>Service</th>
                  <th>Staff</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="appointments-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <div id="admin-toast" class="alert mt-3 d-none" role="alert"></div>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api-client.js"></script>
    <script src="assets/js/pages/admin.js"></script>
  </body>
</html>
